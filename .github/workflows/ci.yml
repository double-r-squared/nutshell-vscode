name: ci

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Syntax check entry point
        run: node -c extension.js
      - name: Syntax check all lib modules
        run: |
          for f in lib/*.js; do
            echo "checking $f"
            node -c "$f"
          done
      - name: Verify package.json shape
        run: |
          node -e "const p=require('./package.json'); ['name','version','publisher','displayName','description','repository','license','icon','engines'].forEach(k => { if (!p[k]) { console.error('missing field:', k); process.exit(1); } })"
      - name: Verify LICENSE present
        run: test -f LICENSE
      - name: Verify CHANGELOG present
        run: test -f CHANGELOG.md
